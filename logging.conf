[loggers]
keys=root,taskboard_agent

[handlers]
keys=console

[formatters]
keys=standard

[logger_root]
level=WARNING
handlers=console

[logger_taskboard_agent]
level=INFO
handlers=console
qualname=taskboard_agent
propagate=0

[handler_console]
class=StreamHandler
level=INFO
formatter=standard
args=(sys.stderr,)

[formatter_standard]
format=%(asctime)s [%(levelname)s] %(trace_id)s - %(message)s
datefmt=%Y-%m-%d %H:%M:%S
